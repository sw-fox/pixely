
name: Pull Request CI

on:
  push:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Use Node.js 22.x
      uses: actions/setup-node@v5
      with:
        node-version: 22.x
        cache: 'npm'
    - name: Install
      run: npm install
    - name: Test
      run: npm run test
    - name: Lint
      run: npm run lint
    - name: Build
      run: npm run build